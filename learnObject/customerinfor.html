<html>
<head>
    <meta charset='utf-8'>
    <title>Tiêu đề trang</title>
    <script>
        function saveCustomerInfo() {
            var customer_name = document.getElementById('customer_name').value;
            var customer_email = document.getElementById('customer_email').value;
            var customer_address = document.getElementById('customer_address').value;
            var customer_phone = document.getElementById('customer_phone').value;
            var birthday_day = document.getElementById('birthday_day').value;
            var birthday_month = document.getElementById('birthday_month').value;
            var birthday_year = document.getElementById('birthday_year').value;

            var customer_information = "Customer Name: " + customer_name + "<br>" +
                               "Customer Email: " + customer_email + "<br>" +
                               "Customer Address: " + customer_address + "<br>" +
                               "Customer Phone: " + customer_phone + "<br>" +
                               "Customer Birthday: " + birthday_day + "/" + birthday_month + "/" + birthday_year;
            document.getElementById('customer_information').innerHTML = customer_information;
        }
    </script>
    <script>
        var customer_type=["Regular","VIP","Potential","Lựu Đạn"];
    </script>
</head>
<body>
    <form name="customer_form">
        <table>
            <tr>
                <td>Customer Name:</td>
                <td><input type="text" name="customer_name" id="customer_name"></td>
            </tr>
            <tr>
                <td>Customer Email:</td>
                <td><input type="email" name="customer_email" id="customer_email"></td>
            </tr>
            <tr>
                <td>Customer Address:</td>
                <td><input type="text" name="customer_address" id="customer_address"></td>
            </tr>
            <tr>
                <td>Customer Phone:</td>
                <td><input type="tel" name="customer_phone" id="customer_phone"></td>
            </tr>
            <tr>
                <td>Customer Birthday:</td>
                <td>
                    <select name="birthday_day" id="birthday_day"></select>
                    <select name="birthday_month" id="birthday_month"></select>
                    <select name="birthday_year" id="birthday_year"></select>
                </td>
            </tr>
            <tr>
                <td>Customer Type:</td>
                <td>
                    <select name="customer_type" id="customer_type">
                    </select>
                </td>
            </tr>
        </table>
        <button type="button" onclick="saveCustomerInfo()">Save</button>
        <div id="customer_information" style="font-weight: bold; font-size: 20px">
        </div>
    </form>
    <script>
        function load_date_for_birthday_selection() 
        {
            var birthday_day = document.getElementById('birthday_day');
var birthday_month = document.getElementById('birthday_month');
            var birthday_year = document.getElementById('birthday_year');
            for (var i=1; i<=31; i++) 
            {
                birthday_day.innerHTML += "<option value='" + i + "'>" + i + "</option>";
            }
            for (var i=1; i<=12; i++) 
            {
                birthday_month.innerHTML += "<option value='" + i + "'>" + i + "</option>";
            }
            for (var i=1965; i<=new Date().getFullYear()-12; i++) 
            {
                birthday_year.innerHTML += "<option value='" + i + "'>" + i + "</option>";
            }
        }
        load_date_for_birthday_selection();
        function show_customer_type()
        {
            var customer_type_selection = document.getElementById('customer_type');
            for (var i=0; i<customer_type.length; i++) 
            {
                customer_type_selection.innerHTML += 
                    "<option value='"+customer_type[i]+"'>"+customer_type[i]+"</option>";
            }
        }
        show_customer_type();
    </script>
</body>
</html>
