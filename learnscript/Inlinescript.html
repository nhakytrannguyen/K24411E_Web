<html > 
    <head> 
            <title>Tiêu đê trang</title> 
    </head>
    <body>
        <form name="myForm">
            <h3>Select language:</h3>
            <input type="radio" name="language" value="vi" id="rad1"
            checked
            onclick="
            id_div_vi.style.display='block';
            id_div_korea.style.display='none';
            id_div_chinese.style.display='none';
            "
            >
            <label for= "rad1">Vietnamese</label><br>
            <input type="radio" name="language" value="korea" id="rad2"
            checked
            onclick="
            id_div_vi.style.display='none';
            id_div_korea.style.display='block';
            id_div_chinese.style.display='none';
            "
            >
            <label for= "rad2">한국어</label><br>
            <input type="radio" name="language" value="chinese" id="rad3"
            checked
            onclick="
            id_div_vi.style.display='none';
            id_div_korea.style.display='none';
            id_div_chinese.style.display='block';
            "
            >
            <label for= "rad3">汉语</label><br>
            <div id="id_div_vi" style="display: block;">
                <h4>Xin chào</h4>
            </div>
            <div id="id_div_korea" style="display: none;">
                <h4>Ok</h4>
            </div>
            <div id="id_div_chinese" style="display: none;">
                <h4>Haha</h4>
            </div>
        </form>
    </body> 
</html>
