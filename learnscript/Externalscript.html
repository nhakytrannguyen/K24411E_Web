<html> 
    <head> 
        <title>Tiêu đề trang</title> 
        <script src="js/mainjs.js"></script>
        <script>
            function showMessage()
            {
                alert("Hello nha")
            }
        </script>
    </head>
    <body>
        <form name="myForm">
            <h3>Select language:</h3>
            <input type="radio" name="language" value="vi" id="rad1" checked onclick="showVietnamese()">
            <label for="rad1">Vietnamese</label><br>
            
            <input type="radio" name="language" value="korea" id="rad2" checked onclick="showKorean()">
            <label for="rad2">한국어</label><br>
            
            <input type="radio" name="language" value="chinese" id="rad3" checked onclick="showChinese()">
            <label for="rad3">汉语</label><br>
            
            <div id="id_div_vi" style="display: block;">
                <h4>Xin chào</h4>
            </div>
            <div id="id_div_korea" style="display: none;">
                <h4>안녕하세요</h4>
            </div>
            <div id="id_div_chinese" style="display: none;">
                <h4>你好</h4>
            </div>
        </form>
    </body> 
</html>
