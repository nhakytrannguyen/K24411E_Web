<html>
<head>
    <meta charset="utf-8">
    <title>Student Card Flip</title>

    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f2f2f2;
        }

        .card{
            width:500px;
            height:500px;
            perspective:1000px;
            cursor:pointer;
        }

        .inner{
            width:100%;
            height:100%;
            position:relative;
            transition:transform 0.8s;
            transform-style:preserve-3d;
        }

        .card:hover .inner{
            transform:rotateY(180deg);
        }

        .front,.back{
            position:absolute;
            width:100%;
            height:100%;
            backface-visibility:hidden;
        }

        .front img,.back img{
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius:15px;
        }

        .back{
            transform:rotateY(180deg);
        }
    </style>
</head>

<body>

<a href="https://is.uel.edu.vn/" target="_blank">

    <div class="card">

        <div class="inner">

            <div class="front">
                <img src="images/IMG_3948.jpg">
            </div>

            <div class="back">
                <img src="images/IMG_3949.jpg">
            </div>

        </div>

    </div>

</a>

</body>
</html>
