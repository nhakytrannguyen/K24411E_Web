<html> 
        <head> 
        <title>Tiêu đê trang</title> 
        </head>
        <body>
            <table border="1" cellspacing="1" cellpadding="5">
                <caption>List of Products</caption>
                <thead> <!--1 thead có thể chứa nhiều tr-->
                    <tr>
                        <th>Product ID</th>
                        <th>Product Name</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody> <!--1 tbody có thể chứa nhiều tr-->
                    <tr>
                        <td>P01</td>
                        <td>Product 1</td>
                        <td>$10</td>
                    </tr>
                    <tr>
                        <td>P02</td>
                        <td>Product 2</td>
                        <td>$20</td>
                    </tr>
                    <tr>
                        <td>P03</td>
                        <td>Product 3</td>
                        <td>$30</td>
                    </tr>
                    <tr>
                        <td>P04</td>
                        <td>Product 4</td>
                        <td>$40</td>
                    </tr>
                    <tr>
                        <td>P05</td>
                        <td>Product 5</td>
                        <td>$50</td>
                    </tr>
                </tbody>
                <tfoot> <!--1 tfoot có thể chứa nhiều tr-->
                    <tr>
                        <td colspan="2">Total</td>
                        <td>$150</td>
                    </tr>
                    <tr>
                        <td colspan="3">Designed by: Tèo Dại Bàng</td>
                </tfoot>
            </table>
        </body> 
</html>
