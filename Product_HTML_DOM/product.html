<html>
<head>
    <meta charset='utf-8'>
    <title>Tiêu đề trang</title>
    <link rel="stylesheet" href="css/main.css">
    <script>
        var products = [
            {id:1, name:'Iphone 14 Pro Max', price: 30000000},
            {id:2, name:'Samsung Galaxy S23', price: 25000000},
            {id:3, name:'Xiaomi Redmi Note 12 Pro', price: 8000000},
            {id:4, name:'Oppo Find X5', price: 18000000}
        ]
    </script>
</head>
<body>
    <table id="tbl_product">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>#Action</th>
            </tr>
        </thead>
        <tbody id="product_table_body">

    <div id="product_detail" style="margin-top: 20px; padding: 15px; border: 1px dashed #333; display: none; width: 300px;">
        <h3>Product Details:</h3>
        <p><strong>Product ID:</strong> <span id="detail_id"></span></p>
        <p><strong>Product Name:</strong> <span id="detail_name"></span></p>
        <p><strong>Price:</strong> <span id="detail_price"></span> VNĐ</p>
    </div>

    <script src="js/main.js"></script>
    <script>
        load_product_data(products, document.getElementById('product_table_body'));
    </script>
</body>
</html>
